name: Update CV PDFs

on:
  push:
    branches:
      - main
    paths:
      - cv-data.json
      - src/**
      - public/**
      - package.json
      - package-lock.json
      - webpack.config.js
      - .github/workflows/update-pdfs.yml
  workflow_dispatch:

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure git to use SSH
        run: git remote set-url origin git@github.com:${{ github.repository }}.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate PDFs
        run: npm run generate:pdfs

      - name: Commit and push PDF updates
        run: |
          if [ -n "$(git status --porcelain muni_besen_en.pdf muni_besen_pt.pdf)" ]; then
            git config user.name "cv-forge-bot"
            git config user.email "cv-forge-bot@users.noreply.github.com"
            git add muni_besen_en.pdf muni_besen_pt.pdf
            git commit -m "chore: update CV PDFs"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          else
            echo "No PDF changes to commit."
          fi


